name: VidalCasino CI/CD Pipeline

on:
  push:
    branches:
      - deploy 

jobs:
  build-and-push:
    name: Build & Push to Amazon ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }} 

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir, etiquetar y subir imagen Docker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ github.sha }}
          IMAGE_TAG_LATEST: latest
          IMAGE_TAG_VERSION: v1.0.${{ github.run_number }}
        run: |
          # 1. Construir la imagen localmente (Cambiado a secrets)
          docker build -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA .
          
          # 2. Asignar los 3 tags simultáneos exigidos (Cambiado a secrets)
          docker tag $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_LATEST
          docker tag $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_VERSION
          
          # 3. Subir las imágenes a ECR (Cambiado a secrets)
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_LATEST
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_VERSION

  deploy-to-eks:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest
    needs: build-and-push 
    steps:
      - name: Clonar código fuente (Manifiestos K8s)
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }} 

      - name: Actualizar configuración de Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER }}

      - name: Desplegar en EKS (100% Automático)
        env:
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          FULL_IMAGE="$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA"
          
          sed -i "s|image: .*|image: $FULL_IMAGE|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/${{ secrets.DEPLOYMENT_NAME }}