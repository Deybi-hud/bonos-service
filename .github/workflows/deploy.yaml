name: VidalCasino CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        env:
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA .
          docker save ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA | gzip > image.tar.gz

      - name: Subir imagen como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  push:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Descargar imagen del artefacto
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Cargar imagen Docker
        run: docker load < image.tar.gz

      - name: Configurar credenciales de AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Etiquetar y subir imagen a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG_SHA: ${{ github.sha }}
          IMAGE_TAG_LATEST: latest
          IMAGE_TAG_VERSION: v1.0.${{ github.run_number }}
        run: |
          docker tag ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA
          docker tag ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_LATEST
          docker tag ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_VERSION

          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_SHA
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_LATEST
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG_VERSION

  deploy:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Clonar código fuente (Manifiestos K8s)
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS Academy
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Actualizar configuración de Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER }}

      - name: Desplegar en EKS (100% Automático)
        env:
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
