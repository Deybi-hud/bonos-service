apiVersion: apps/v1
kind: Deployment
metadata:
  name: bonos-service
  labels:
    app: bonos-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bonos-service
  template:
    metadata:
      labels:
        app: bonos-service
    spec:
      containers:
      - name: bonos-service
        image: nginx 
        ports:
        - containerPort: 8004
        envFrom:
        - secretRef:
            name: casino-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /livez
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
